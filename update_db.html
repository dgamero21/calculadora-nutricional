        window.runImport = async () => {
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('pass').value;
            if (!email || !pass) { alert('Ingresá email y contraseña'); return; }

            log('🔐 Autenticando...', 'info');
            let userId;
            try {
                const cred = await signInWithEmailAndPassword(auth, email, pass);
                userId = cred.user.uid;
                log(`✅ Sesión iniciada. UID: ${userId}`, 'ok');
            } catch (e) {
                log(`❌ Error de autenticación: ${e.message}`, 'err');
                return;
            }

            log('\n📥 Cargando ingredientes actuales de Firestore...', 'info');
            const q = query(collection(db, 'ingredients'), where('userId', '==', userId));
            const snap = await getDocs(q);

            // Build map: normalized name → { id, data }
            const existing = {};
            snap.forEach(d => {
                const key = d.data().name.trim().toLowerCase();
                existing[key] = { id: d.id, data: d.data() };
            });
            log(`   Encontrados ${Object.keys(existing).length} ingredientes existentes`, 'info');

            let created = 0, updated = 0, skipped = 0;

            for (const row of SHEET_DATA) {
                const [name, carbs, protein, fatTotal, fatSat, fatTrans, fiber, sodium, water, at, aa] = row;
                const key = name.trim().toLowerCase();
                const ingData = {
                    name, unit: 100, carbs, protein, fatTotal, fatSat, fatTrans,
                    fiber, sodium, water, at, aa, userId
                };

                if (existing[key]) {
                    // Update existing
                    try {
                        await updateDoc(doc(db, 'ingredients', existing[key].id), ingData);
                        log(`🔄 Actualizado: ${name}`, 'info');
                        updated++;
                    } catch (e) {
                        log(`❌ Error actualizando ${name}: ${e.message}`, 'err');
                    }
                } else {
                    // Create new
                    try {
                        await addDoc(collection(db, 'ingredients'), { ...ingData, createdAt: new Date().toISOString() });
                        log(`➕ Creado: ${name}`, 'ok');
                        created++;
                    } catch (e) {
                        log(`❌ Error creando ${name}: ${e.message}`, 'err');
                    }
                }
            }

            log(`\n✅ Importación completada:`, 'ok');
            log(`   ➕ Nuevos: ${created}`, 'ok');
            log(`   🔄 Actualizados: ${updated}`, 'info');
            log(`   ⏭ Sin cambios: ${skipped}`, '');
            log(`\nRecargá la app para ver los cambios.`, 'info');
        };
